<title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Codu mascot themed background pattern, mobile aspect ratio, low contrast</title>
<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">A dense low contrast pattern of icons related to the Codu mascot: code brackets, chat bubbles, a rounded screen face shape, and antenna dots, in a tone close to the background blue, scattered and rotated across a tall mobile-ratio canvas without overlapping.</desc>
<defs>
<g id="codeIcon">
  <rect x="-30" y="-23" width="60" height="46" rx="12" fill="#3CB2E5"/>
  <text x="0" y="8" font-family="var(--font-mono)" font-size="23" font-weight="700" fill="#33A6DB" text-anchor="middle">&lt;/&gt;</text>
</g>
<g id="bubbleIcon">
