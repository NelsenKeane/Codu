<!DOCTYPE html>
<html>
<head>
  <title>SVG Rasterizer</title>
  <style>
    body {
      background-color: #121212;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 40px;
      max-width: 800px;
      margin: 0 auto;
    }
    h1 {
      color: #bb86fc;
      margin-bottom: 20px;
    }
    .badge-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 20px;
      margin-top: 25px;
    }
    .badge-card {
      background-color: #1e1e1e;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 10px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .badge-card img {
      width: 80px;
      height: 80px;
      object-fit: contain;
      background-color: #2a2a2a;
      border-radius: 4px;
      margin-bottom: 10px;
    }
    .badge-card .status {
      font-size: 12px;
      color: #03dac6;
    }
    .badge-card .status.pending {
      color: #cf6679;
    }
    #log {
      background-color: #000;
      color: #00ff00;
      font-family: monospace;
      padding: 15px;
      border-radius: 6px;
      height: 200px;
      overflow-y: auto;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h1>Badge SVG to PNG Renderer & Uploader</h1>
  <p>Loading SVGs, rendering to canvas at 512x512, and uploading high-quality PNGs...</p>
  
  <div id="log">Logs:</div>
  <div class="badge-container" id="badges"></div>

  <script>
    const logDiv = document.getElementById('log');
    function log(msg) {
      logDiv.innerHTML += '<br>' + msg;
      logDiv.scrollTop = logDiv.scrollHeight;
      console.log(msg);
    }

    const badges = [
      { name: "Badge1.png", svg: "/assets/images/Badge/Badge1.svg" },
      { name: "Badge1 (2).png", svg: "/assets/images/Badge/Badge1 (2).svg" },
      { name: "Badge1 (3).png", svg: "/assets/images/Badge/Badge1 (3).svg" },
      { name: "Badge1 (4).png", svg: "/assets/images/Badge/Badge1 (4).svg" },
      { name: "Badge1 (5).png", svg: "/assets/images/Badge/Badge1 (5).svg" },
      { name: "Badge1 (6).png", svg: "/assets/images/Badge/Badge1 (6).svg" },
      { name: "Badge1 (7).png", svg: "/assets/images/Badge/Badge1 (7).svg" },
      { name: "Badge1 (8).png", svg: "/assets/images/Badge/Badge1 (8).svg" },
      { name: "Badge1 (9).png", svg: "/assets/images/Badge/Badge1 (9).svg" }
    ];

    const badgesContainer = document.getElementById('badges');

    // Create cards
    badges.forEach((b, idx) => {
      const card = document.createElement('div');
      card.className = 'badge-card';
      card.id = `card-${idx}`;
      card.innerHTML = `
        <img id="img-${idx}" src="${b.svg}" alt="${b.name}">
        <div>Badge ${idx + 1}</div>
        <div class="status pending" id="status-${idx}">Pending</div>
      `;
      badgesContainer.appendChild(card);
    });

    async function processBadge(idx) {
      const b = badges[idx];
      const img = document.getElementById(`img-${idx}`);
      const statusText = document.getElementById(`status-${idx}`);
      
      log(`Processing ${b.name}...`);
      
      return new Promise((resolve) => {
        // Ensure image is loaded
        const onload = () => {
          try {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            // Draw image on canvas
            ctx.drawImage(img, 0, 0, 512, 512);
            
            // Get base64 PNG data
            const dataUrl = canvas.toDataURL('image/png');
            const base64Data = dataUrl.split(',')[1];
            
            log(`Uploading rendered PNG for ${b.name}...`);
            
            // POST to server
            fetch('/upload', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                filename: b.name,
                base64: base64Data
              })
            })
            .then(res => {
              if (res.ok) {
                statusText.innerText = 'Uploaded';
                statusText.className = 'status';
                log(`Successfully uploaded ${b.name}`);
              } else {
                statusText.innerText = 'Upload Failed';
                log(`Upload failed for ${b.name}`);
              }
              resolve();
            })
            .catch(err => {
              statusText.innerText = 'Error';
              log(`Error uploading ${b.name}: ${err}`);
              resolve();
            });
          } catch (e) {
            statusText.innerText = 'Render Error';
            log(`Render error for ${b.name}: ${e}`);
            resolve();
          }
        };

        if (img.complete) {
          onload();
        } else {
          img.onload = onload;
          img.onerror = () => {
            statusText.innerText = 'Load Error';
            log(`Failed to load SVG: ${b.svg}`);
            resolve();
          };
        }
      });
    }

    async function runAll() {
      // Small delay to ensure browser environment is fully loaded
      await new Promise(r => setTimeout(r, 1000));
      for (let i = 0; i < badges.length; i++) {
        await processBadge(i);
      }
      log("All badges processed!");
      
      // Signal to browser test that we are finished
      const doneIndicator = document.createElement('div');
      doneIndicator.id = 'done-indicator';
      doneIndicator.style.display = 'none';
      document.body.appendChild(doneIndicator);
    }

    window.onload = runAll;
  </script>
</body>
</html>
